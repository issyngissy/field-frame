services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fieldframe
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build: ./server
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fieldframe
    depends_on:
      - db

  client:
    build: ./client
    ports:
      - "3000:3000"
    environment:
      - HOST=0.0.0.0
    depends_on:
      - server

volumes:
  postgres_data: